<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Player Zone</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-black">

    <div class="container vh-100 d-flex justify-content-center align-items-center">

        <div class="bg-dark p-4 rounded shadow w-50">

            <h1 class="text-center text-primary mb-4">
                Player Zone
            </h1>

            <form id="formLogin">

                <label class="text-light">
                    Email
                </label>

                <input type="email" id="emailLogin" class="form-control mb-3" placeholder="Digite seu email">

                <label class="text-light">
                    Senha
                </label>

                <input type="password" id="senhaLogin" class="form-control mb-4" placeholder="Digite sua senha">

                <div id="mensagemLogin" class="text-danger mb-3"></div>

                <button class="btn btn-primary w-100 mb-2">
                    Entrar
                </button>

                <a href="cadastro.html" class="btn btn-outline-light w-100">
                    Criar Conta
                </a>

            </form>

        </div>
    </div>

    <script>

        document.getElementById("formLogin").addEventListener("submit", function (event) {

            event.preventDefault();

            let emailDigitado = document.getElementById("emailLogin").value;
            let senhaDigitada = document.getElementById("senhaLogin").value;

            let emailSalvo = localStorage.getItem("email");
            let senhaSalva = localStorage.getItem("senha");

            let mensagem = document.getElementById("mensagemLogin");

            if (emailDigitado == emailSalvo && senhaDigitada == senhaSalva) {

                alert("Login realizado com sucesso!");


                window.location.href = "index.html";

            }
            else {

                mensagem.innerHTML = "Email ou senha incorretos.";

            }

        });

    </script>

</body>

</html>

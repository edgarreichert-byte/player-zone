<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Cadastro - Player Zone</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-black">

    <div class="container vh-100 d-flex justify-content-center align-items-center">

        <div class="bg-dark p-5 rounded shadow w-50">

            <h1 class="text-center text-primary mb-4">
                Player Zone
            </h1>

            <h4 class="text-center text-light mb-4">
                Criar Conta
            </h4>

            <form id="formCadastro">

                <label class="text-light mb-2">
                    Nome de Usuário
                </label>

                <input type="text" class="form-control mb-3" placeholder="Digite seu nome">

                <label class="text-light mb-2">
                    Email
                </label>

                <input type="email" id="email" class="form-control mb-3" placeholder="Digite seu email">

                <label class="text-light mb-2">
                    Senha
                </label>

                <input type="password" id="senha" class="form-control mb-3" placeholder="Crie uma senha">

                <label class="text-light mb-2">
                    Confirmar Senha
                </label>

                <input type="password" id="confirmarSenha" class="form-control mb-3" placeholder="Confirme sua senha">

                <div id="mensagem" class="text-danger mb-3"></div>

                <button class="btn btn-primary w-100 mb-3">
                    Cadastrar
                </button>

                <a href="login.html" class="btn btn-outline-light w-100">
                    Voltar ao Login
                </a>

            </form>

        </div>
    </div>

    <script>

        document.getElementById("formCadastro").addEventListener("submit", function (event) {

            event.preventDefault();

            let email = document.getElementById("email").value;
            let senha = document.getElementById("senha").value;
            let confirmar = document.getElementById("confirmarSenha").value;
            let mensagem = document.getElementById("mensagem");

            let regex = /^[^@]+@[^@]+\.com$/;

            if (!regex.test(email)) {

                mensagem.innerHTML = "Email inválido.";

                return;

            }

            if (senha.length < 6) {

                mensagem.innerHTML = "Senha precisa ter 6 caracteres.";

                return;

            }

            if (senha != confirmar) {

                mensagem.innerHTML = "As senhas não coincidem.";

                return;

            }

            localStorage.setItem("email", email);
            localStorage.setItem("senha", senha);

            alert("Cadastro realizado com sucesso!");

            window.location.href = "login.html";

        });

    </script>

</body>

</html>
